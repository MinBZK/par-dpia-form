version: 2
updates:
  # npm — alle workspaces via root lockfile
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: weekly
    ignore:
      - dependency-name: "typescript"

  # Container images — Containerfiles live under containers/<service>/
  - package-ecosystem: "docker"
    directory: "/containers/backend"
    schedule:
      interval: weekly

  - package-ecosystem: "docker"
    directory: "/containers/frontend"
    schedule:
      interval: weekly

  - package-ecosystem: "docker"
    directory: "/containers/standalone"
    schedule:
      interval: weekly

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
