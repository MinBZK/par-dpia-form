name: Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: parassessment
          POSTGRES_PASSWORD: parassessment
          POSTGRES_DB: parassessment_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'

      - name: Enable corepack & pin pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.13.0+sha512.88d94724d8f2e6c186744a5584c6e59ecac869ec7ba15e9cb4cd628e8dc7066820b2481d8ee3b51ea8da323a7378068aa58c556a3720d32b7c20a051d088363a --activate

      - name: Install dependencies
        run: pnpm install

      - name: CSP inline-style guard (#326)
        run: pnpm check:csp

      - name: Set up uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: '3.14'
          enable-cache: true

      - name: Security audit (production dependencies)
        run: pnpm audit --prod --audit-level high

      - name: Generate assessment JSON sources
        run: |
          mkdir -p sources/generated
          uv run --frozen python script/run_all.py \
            --schema schemas/assessment-definition.v2.schema.json \
            --source sources/prescan.yaml \
            --begrippen-yaml sources/begrippenkader_dpia.yaml \
            --output-json sources/generated/PreScanDPIA.json
          uv run --frozen python script/run_all.py \
            --schema schemas/assessment-definition.v2.schema.json \
            --source sources/dpia.yaml \
            --begrippen-yaml sources/begrippenkader_dpia.yaml \
            --output-json sources/generated/DPIA.json
          uv run --frozen python script/run_all.py \
            --schema schemas/assessment-definition.v2.schema.json \
            --source sources/iama.yaml \
            --begrippen-yaml sources/begrippenkader_iama.yaml \
            --output-json sources/generated/IAMA.json \
            --definitions-once-per-page

      - name: Run Python pipeline tests
        run: uv run --frozen pytest script/tests -q

      - name: Type check backend
        run: cd apps/boekhouding-backend && npx tsc --noEmit

      - name: Type check frontend
        run: cd apps/boekhouding-frontend && npx vue-tsc --noEmit

      - name: Type check standalone form
        run: cd apps/standalone-form && npx vue-tsc --noEmit

      - name: Run backend tests
        env:
          TEST_DATABASE_URL: postgresql://parassessment:parassessment@localhost:5432/parassessment_test
        run: pnpm --filter boekhouding-backend test

      - name: Run coverage (alle workspaces)
        env:
          TEST_DATABASE_URL: postgresql://parassessment:parassessment@localhost:5432/parassessment_test
        run: pnpm -r --if-present test:coverage

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-reports
          path: |
            packages/*/coverage
            apps/*/coverage
          if-no-files-found: ignore
          retention-days: 14
