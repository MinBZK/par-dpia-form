name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Valideer CalVer-tagformaat
        run: |
          set -euo pipefail
          # CalVer YYYY.M.D met optionele .MICRO voor meerdere releases op
          # dezelfde dag. Maand en dag zonder voorloopnul.
          # Geldig:   v2026.6.6, v2026.12.31, v2026.6.6.1
          # Ongeldig: v2026.06.06 (geen padding toegestaan), v2026.13.1 (maand > 12),
          #           v0.1.3 (oude SemVer-tags worden niet opnieuw gereleased)
          regex='^v[0-9]{4}\.(1[0-2]|[1-9])\.(3[01]|[12][0-9]|[1-9])(\.[0-9]+)?$'
          if ! printf '%s\n' "$TAG_NAME" | grep -Eq "$regex"; then
            echo "Tag ${TAG_NAME} voldoet niet aan CalVer (vYYYY.M.D[.MICRO])." >&2
            echo "Voorbeeld: v2026.6.6 of v2026.6.6.1." >&2
            exit 1
          fi

      - name: Haal changelog-sectie op
        run: |
          set -euo pipefail
          version="${TAG_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { flag = 1; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Geen changelog-sectie gevonden voor ${version}." >&2
            echo "Voeg een sectie '## [${version}]' toe aan CHANGELOG.md." >&2
            exit 1
          fi

      - name: Maak GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --notes-file release-notes.md
