name: Build images (reusable)

on:
  workflow_call:
    inputs:
      frontend-image:
        required: true
        type: string
      backend-image:
        required: true
        type: string
      tag-prefix:
        required: false
        type: string
        default: ''
      tag-latest:
        required: false
        type: boolean
        default: false
    outputs:
      frontend-image:
        value: ${{ jobs.build-frontend.outputs.image }}
      backend-image:
        value: ${{ jobs.build-backend.outputs.image }}

jobs:
  generate-sources:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: '3.14'
          enable-cache: true
      - name: Generate JSON from YAML definitions
        run: |
          mkdir -p sources/generated
          uv run --frozen --no-dev python script/run_all.py \
            --schema schemas/assessment-definition.v2.schema.json \
            --source sources/prescan.yaml \
            --begrippen-yaml sources/begrippenkader_dpia.yaml \
            --output-json sources/generated/PreScanDPIA.json \
            --output-md docs/questions/questions_prescan_DPIA.md
          uv run --frozen --no-dev python script/run_all.py \
            --schema schemas/assessment-definition.v2.schema.json \
            --source sources/dpia.yaml \
            --begrippen-yaml sources/begrippenkader_dpia.yaml \
            --output-json sources/generated/DPIA.json \
            --output-md docs/questions/questions_DPIA.md
          uv run --frozen --no-dev python script/run_all.py \
            --schema schemas/assessment-definition.v2.schema.json \
            --source sources/iama.yaml \
            --begrippen-yaml sources/begrippenkader_iama.yaml \
            --output-json sources/generated/IAMA.json \
            --definitions-once-per-page
      - uses: actions/upload-artifact@v4
        with:
          name: generated-sources
          path: sources/generated/
          retention-days: 1

  build-backend:
    needs: generate-sources
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image-ref.outputs.image }}
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          name: generated-sources
          path: sources/generated/
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.backend-image }}
          tags: |
            type=sha,prefix=${{ inputs.tag-prefix }}
            type=raw,value=latest,enable=${{ inputs.tag-latest }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/backend/Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - id: image-ref
        run: echo "image=${{ inputs.backend-image }}:${{ inputs.tag-prefix }}${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Trivy image scan (report-only, SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ steps.image-ref.outputs.image }}
          scan-type: image
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Trivy results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend
      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ steps.image-ref.outputs.image }}
          scan-type: image
          format: cyclonedx
          output: trivy-sbom-backend.json
          list-all-pkgs: 'true'
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-backend
          path: trivy-sbom-backend.json
          retention-days: 30

  build-frontend:
    needs: generate-sources
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image-ref.outputs.image }}
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          name: generated-sources
          path: sources/generated/
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.frontend-image }}
          tags: |
            type=sha,prefix=${{ inputs.tag-prefix }}
            type=raw,value=latest,enable=${{ inputs.tag-latest }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/frontend/Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - id: image-ref
        run: echo "image=${{ inputs.frontend-image }}:${{ inputs.tag-prefix }}${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Trivy image scan (report-only, SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ steps.image-ref.outputs.image }}
          scan-type: image
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Trivy results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend
      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ steps.image-ref.outputs.image }}
          scan-type: image
          format: cyclonedx
          output: trivy-sbom-frontend.json
          list-all-pkgs: 'true'
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-frontend
          path: trivy-sbom-frontend.json
          retention-days: 30
