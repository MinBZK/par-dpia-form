name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install pyyaml jsonschema

      - name: Generate JSON from YAML definitions
        run: |
          mkdir -p sources/generated

          python script/run_all.py \
            --schema schemas/assessment-definition.v1.schema.json \
            --source sources/prescan_dpia.yaml \
            --begrippen-yaml sources/begrippenkader_dpia.yaml \
            --output-json sources/generated/PreScanDPIA.json \
            --output-md docs/questions/questions_prescan_DPIA.md

          python script/run_all.py \
            --schema schemas/assessment-definition.v1.schema.json \
            --source sources/dpia.yaml \
            --begrippen-yaml sources/begrippenkader_dpia.yaml \
            --output-json sources/generated/DPIA.json \
            --output-md docs/questions/questions_DPIA.md

          # Verify generated files
          echo "Verifying generated JSON files..."
          if [ ! -f sources/generated/PreScanDPIA.json ] || [ ! -f sources/generated/DPIA.json ]; then
            echo "::error::One or more JSON files were not generated"
            exit 1
          fi

          echo "JSON files successfully generated"

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Enable pnpm via corepack
        run: corepack enable

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build the Vue application
        run: |
          cd apps/standalone-form
          pnpm build

          # Verify build output
          echo "Verifying build output..."
          if [ ! -f dist/index.html ]; then
            echo "::error::index.html not found in dist directory"
            exit 1
          fi

          echo "Listing dist directory content:"
          ls -la dist/
