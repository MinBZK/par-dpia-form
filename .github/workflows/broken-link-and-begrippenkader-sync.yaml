name: Check for broken links and sync definitions
on:
  # Run daily at 9:00 AM
  schedule:
    - cron: '0 9 * * *'
  # Run the link check on every PR (the begrippenkader-sync jobs below are
  # gated to schedule/dispatch and PRs to main only).
  pull_request:
  # Allow manual triggering
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-links:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        # First attempt is allowed to fail; the retry step below clears the
        # transient rate-limit/timeout failures that a manual re-run usually
        # fixed. A real broken link still fails on the second attempt.
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Target specific files and improve the arguments.
          # open.overheid.nl serves an incomplete TLS chain (leaf from
          # DigiCert, intermediates still from certSIGN), so lychee cannot
          # verify it. Review the exclusions periodically.
          args: &lychee_args >-
            --verbose
            --no-progress
            --root-dir "${{ github.workspace }}"
            --timeout 30
            --max-retries 3
            --retry-wait-time 2
            --exclude-loopback
            --exclude "file:///.*/issues.*"
            --exclude "file:///home/runner/work/.*"
            --exclude "https://rijksportaal.overheid-i.nl/.*"
            --exclude "https://open.overheid.nl/.*"
            --exclude "https://www.npmjs.com/.*"
            --exclude "https://httpproblems.com/.*"
            --exclude "^http://(keycloak|backend|postgres):[0-9]+"
            --exclude "https://github.com/MinBZK/par-dpia-form/blob/main/schemas/.*"
            --exclude-path '/test/'
            --exclude-path 'pnpm-lock\.yaml'
            '**/*.yaml'
            '**/*.md'
            '**/*.ts'
            '**/*.vue'
          # Output file for creating issues
          output: ./lychee/out.md
          # Fail if any link is broken
          fail: true

      # Cool-down before the retry so rate-limit windows (HTTP 429) reset.
      - name: Wait before link-check retry
        if: steps.lychee.outcome == 'failure'
        run: sleep 30

      - name: Link Checker (retry)
        id: lychee_retry
        if: steps.lychee.outcome == 'failure'
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: *lychee_args
          output: ./lychee/out.md
          fail: true

      - name: Update or create the broken-links issue (schedule/manual only)
        if: ${{ failure() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh issue list --label broken-links --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue edit "$existing" --body-file ./lychee/out.md
          else
            # gh issue create needs the label to exist; ensure it idempotently.
            gh label create broken-links --color ededed --description "Automatically detected broken links" 2>/dev/null || true
            gh issue create --title "Broken links detected" --body-file ./lychee/out.md --label broken-links
          fi

  sync-begrippenkader-dpia:
    runs-on: ubuntu-latest
    needs: check-links
    # Run on schedule/dispatch, and on PRs only when they target main (these
    # jobs auto-commit external content, so don't run them on arbitrary PRs).
    if: ${{ always() && (github.event_name != 'pull_request' || github.base_ref == 'main') }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Download YAML file
        run: |
          curl -s https://modellen.jenvgegevens.nl/dpia/begrippenkader-dpia.yaml -o sources/begrippenkader_dpia.yaml
      - name: Check for changes
        id: git-check
        run: |
          git add sources/begrippenkader_dpia.yaml
          if ! git diff --staged --quiet; then
            echo "changes=true" >> "$GITHUB_ENV"
          else
            echo "changes=false" >> "$GITHUB_ENV"
          fi
      - name: Commit directly (when in PR)
        if: env.changes == 'true' && github.event_name == 'pull_request'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "Auto-sync begrippenkader-dpia.yaml from external source"
          git push
      - name: Create pull request (when scheduled or manual)
        if: env.changes == 'true' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch="auto-sync-yaml-${{ github.run_number }}"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git switch -c "$branch"
          git commit -m "Auto-sync YAML file from external source"
          git push --set-upstream origin "$branch"
          # Single quotes keep the backticks literal markdown (no substitution).
          # shellcheck disable=SC2016
          body=$(printf '%s\n' \
            'Automated sync of `begrippenkader_dpia.yaml` from external source.' \
            '' \
            'Source: https://modellen.jenvgegevens.nl/dpia/begrippenkader-dpia.yaml' \
            '' \
            'This PR was created automatically by the sync-yaml workflow.')
          gh pr create \
            --base main \
            --head "$branch" \
            --title "Auto-sync YAML file from external source" \
            --body "$body"

  sync-begrippenkader-iama:
    runs-on: ubuntu-latest
    # Allow this job to continue even if the check-links job fails
    needs: check-links
    # Run on schedule/dispatch, and on PRs only when they target main (these
    # jobs auto-commit external content, so don't run them on arbitrary PRs).
    if: ${{ always() && (github.event_name != 'pull_request' || github.base_ref == 'main') }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Set up uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: '3.14'
          enable-cache: true
      - name: Sync Algoritmekader definitions
        run: |
          uv run --frozen --no-dev python script/convert_definitions_from_algoritmekader.py --output sources/begrippenkader_iama.yaml
      - name: Check for changes
        id: git-check
        run: |
          git add sources/begrippenkader_iama.yaml
          if ! git diff --staged --quiet; then
            echo "changes=true" >> "$GITHUB_ENV"
          else
            echo "changes=false" >> "$GITHUB_ENV"
          fi
      - name: Commit directly (when in PR)
        if: env.changes == 'true' && github.event_name == 'pull_request'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "Auto-sync begrippenkader_iama.yaml from Algoritmekader"
          git push
      - name: Create pull request (when scheduled or manual)
        if: env.changes == 'true' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch="auto-sync-begrippenkader-iama-${{ github.run_number }}"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git switch -c "$branch"
          git commit -m "Auto-sync begrippenkader_iama.yaml from Algoritmekader"
          git push --set-upstream origin "$branch"
          body=$(printf '%s\n' \
            'Automated sync of IAMA definitions from the Algoritmekader begrippenlijst.' \
            '' \
            'Source: https://github.com/MinBZK/Algoritmekader/blob/main/includes/begrippenlijst.md' \
            '' \
            'This PR was created automatically by the sync workflow.')
          gh pr create \
            --base main \
            --head "$branch" \
            --title "Auto-sync begrippenkader_iama.yaml from Algoritmekader" \
            --body "$body"
