name: Check for broken links and sync definitions
on:
  # Run daily at 9:00 AM
  schedule:
    - cron: '0 9 * * *'
  # Run on PRs to main
  pull_request:
    branches: [ main ]
  # Allow manual triggering
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@v1.5.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Target specific files and improve the arguments
          args: >-
            --verbose
            --no-progress
            --exclude-mail
            --exclude-loopback
            --exclude "file:///.*/issues.*"
            --exclude "file:///home/runner/work/.*"
            --exclude "https://rijksportaal.overheid-i.nl/.*"
            '**/*.yaml'
            '**/*.md'
            '**/*.ts'
            '**/*.vue'
          # Output file for creating issues
          output: ./lychee/out.md
          # Fail if any link is broken
          fail: true

      # Only create an issue when broken links are found AND running on schedule/manual
      - name: Create Issue (Only on schedule or manual run)
        if: ${{ failure() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
        uses: peter-evans/create-issue-from-file@v4
        with:
          title: Broken links detected
          content-filepath: ./lychee/out.md
          labels: broken-links

  sync-begrippenkader-dpia:
    runs-on: ubuntu-latest
    needs: check-links
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download YAML file
        run: |
          curl -s https://modellen.jenvgegevens.nl/dpia/begrippenkader-dpia.yaml -o sources/begrippenkader-dpia.yaml
      - name: Check for changes
        id: git-check
        run: |
          git add sources/begrippenkader-dpia.yaml
          if ! git diff --staged --quiet; then
            echo "changes=true" >> $GITHUB_ENV
          else
            echo "changes=false" >> $GITHUB_ENV
          fi
      - name: Commit directly (when in PR)
        if: env.changes == 'true' && github.event_name == 'pull_request'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "Auto-sync begrippenkader-dpia.yaml from external source"
          git push
      - name: Create Pull Request (when scheduled or manual)
        if: env.changes == 'true' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: peter-evans/create-pull-request@v5
        with:
          base: main
          commit-message: "Auto-sync begrippenkader-dpia.yaml from external source"
          title: "Auto-sync begrippenkader-dpia.yaml from external source"
          body: |
            Automated sync of `begrippenkader-dpia.yaml` from external source.

            Source: https://modellen.jenvgegevens.nl/dpia/begrippenkader-dpia.yaml

            This PR was created automatically by the sync workflow.
          branch: auto-sync-begrippenkader-dpia-${{ github.run_number }}
          delete-branch: true

  sync-begrippenkader-iama:
    runs-on: ubuntu-latest
    needs: check-links
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install Python dependencies
        run: pip install pyyaml
      - name: Sync Algoritmekader definitions
        run: |
          python script/convert_definitions_from_AK.py --output sources/begrippenkader-iama.yaml
      - name: Check for changes
        run: |
          git add sources/begrippenkader-iama.yaml
          if ! git diff --staged --quiet; then
            echo "changes=true" >> $GITHUB_ENV
          else
            echo "changes=false" >> $GITHUB_ENV
          fi
      - name: Commit directly (when in PR)
        if: env.changes == 'true' && github.event_name == 'pull_request'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "Auto-sync begrippenkader-iama.yaml from Algoritmekader"
          git push
      - name: Create Pull Request (when scheduled or manual)
        if: env.changes == 'true' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: peter-evans/create-pull-request@v5
        with:
          base: main
          commit-message: "Auto-sync begrippenkader-iama.yaml from Algoritmekader"
          title: "Auto-sync begrippenkader-iama.yaml from Algoritmekader"
          body: |
            Automated sync of IAMA definitions from the Algoritmekader begrippenlijst.

            Source: https://github.com/MinBZK/Algoritmekader/blob/main/includes/begrippenlijst.md

            This PR was created automatically by the sync workflow.
          branch: auto-sync-begrippenkader-iama-${{ github.run_number }}
          delete-branch: true
