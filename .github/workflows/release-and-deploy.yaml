name: Release and Deploy

on:
  release:
    types: [created, edited]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy (leave empty for latest)'
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: '3.14'
          enable-cache: true

      - name: Generate JSON from YAML definitions
        run: |
          mkdir -p sources/generated

          uv run --frozen --no-dev python script/run_all.py \
            --schema schemas/assessment-definition.v2.schema.json \
            --source sources/prescan.yaml \
            --begrippen-yaml sources/begrippenkader_dpia.yaml \
            --output-json sources/generated/PreScanDPIA.json \
            --output-md docs/questions/questions_prescan_DPIA.md

          uv run --frozen --no-dev python script/run_all.py \
            --schema schemas/assessment-definition.v2.schema.json \
            --source sources/dpia.yaml \
            --begrippen-yaml sources/begrippenkader_dpia.yaml \
            --output-json sources/generated/DPIA.json \
            --output-md docs/questions/questions_DPIA.md

          uv run --frozen --no-dev python script/run_all.py \
            --schema schemas/assessment-definition.v2.schema.json \
            --source sources/iama.yaml \
            --begrippen-yaml sources/begrippenkader_iama.yaml \
            --output-json sources/generated/IAMA.json \
            --definitions-once-per-page

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Enable corepack & pin pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.32.1+sha512.a706938f0e89ac1456b6563eab4edf1d1faf3368d1191fc5c59790e96dc918e4456ab2e67d613de1043d2e8c81f87303e6b40d4ffeca9df15ef1ad567348f2be --activate

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build the Vue application
        run: |
          cd apps/standalone-form
          pnpm build

      - name: Create version.json for tracking
        run: |
          echo '{
            "version": "${{ github.event.release.tag_name || github.ref_name }}",
            "deployed_at": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'",
            "commit_sha": "'${{ github.sha }}'"
          }' > apps/standalone-form/dist/version.json

          # Verify version.json was created
          echo "Contents of version.json:"
          cat apps/standalone-form/dist/version.json

          # Verify it exists in the directory
          ls -la apps/standalone-form/dist/

      # Create ZIP for release attachment
      - name: Create release ZIP
        run: |
          cd apps/standalone-form/dist
          zip -r ../../dpia-form-${{ github.event.release.tag_name || github.ref_name }}.zip .

      # Only execute for release events (not workflow_dispatch)
      - name: Upload release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dpia-form-${{ github.event.release.tag_name }}.zip
            apps/standalone-form/dist/index.html
            apps/standalone-form/dist/version.json

      # Deploy to GitHub Pages (gh-pages branch)
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apps/standalone-form/dist
          keep_files: true
