          - task: >-
              Welke positieve effecten introduceert de inzet van het algoritme
              voor deze mensen en/of groepen? Let ook op de gediende publieke waarden (vraag 1.2.1).
            id: "3.5.3"
            type:
              - open_text
            repeatable: false
          - task: >-
              Op welke manier hebben betrokkenen de mogelijkheid tot inspraak?
              Worden ze actief betrokken?
            id: "3.5.4"
            type:
              - open_text
            repeatable: false
          - task: >-
              Is er een opt-out voor betrokkenen? Hoe is dit ingeregeld?
            id: "3.5.5"
            type:
              - open_text
            repeatable: false
          - task: >-
              Zou de inzet van dit (soort) algoritme(s) kunnen leiden tot
              ongewenste maatschappelijke effecten? Hoe acceptabel zijn deze
              ongewenste effecten? Leg uit.
            description: >-
              Bijvoorbeeld: afhankelijkheid van technologie, erosie van vertrouwen in (publieke) instellingen,
              veranderingen in maatschappelijke normen, overmatige simplificatie van de werkelijkheid, negatieve
              impact op het milieu, etc.
            id: "3.5.6"
            type:
              - open_text
            repeatable: false
            references:
              IAMA:
                - id: "5.A.2"
                  type: pre-view
          - task: >-
              Zijn er zorgen over dit algoritme die tot dusver niet (genoeg) aan
              bod zijn gekomen? Zo ja, wat zijn deze zorgen en hoe kunnen deze
              weggenomen worden?
            id: "3.5.7"
            type:
              - open_text
            repeatable: false
      - task: Actiepunten Deel 3
        id: "3.actiepunten"
        is_official_id: false
        action_point_group: true
        description: >-
          Voer hieronder de actiepunten in die volgen uit dit deel.
