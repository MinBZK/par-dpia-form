              toepassingsbereik van de gelijkebehandelingswetgeving valt
              (Algemene wet gelijke behandeling, Wet gelijke behandeling op
              grond van handicap en chronische ziekte, etc.)?
            description: >-
              Zo ja, toets dan of is voldaan aan de rechtvaardigingsvoorwaarden die in de toepasselijke
              gelijkebehandelingswet zijn opgenomen. Maak hier eventueel een actiepunt van.
            id: "4.2.3"
            type:
              - open_text
            repeatable: false
          - task: >-
              Zijn er andere specifieke wettelijke bepalingen van toepassing op
              de grondrechteninbreuk, zoals de Algemene wet bestuursrecht,
              strafprocesrecht, civiel procesrecht, DSA, DMA, IE-wetgeving,
              mediawetgeving, consumentenrecht, milieuwetgeving?
            description: >-
              Zo ja, toets dan of het algoritme verenigbaar is met de specifiek toepasselijke wettelijke bepalingen.
              Het gaat dan bijvoorbeeld om de vraag of beperkingen van procedurele mogelijk­ heden toegelaten zijn
              door het toepasselijke procesrecht, of algemene beginselen van behoorlijk bestuur worden gerespecteerd,
              of verplichtingen dreigen te worden geschonden die voortvloeien uit Europese verordeningen en richtlijnen,
              etc. Maak hier eventueel een actiepunt van.
            id: "4.2.4"
            type:
              - open_text
            repeatable: false
          - task: >-
              Is er specifieke nationale of Europese rechtspraak beschikbaar
              waarin concrete criteria en factoren worden aangereikt om de
              negatieve impact op het grondrecht te kunnen beoordelen?
            description: >-
              Zo ja, pas dan primair deze concrete criteria en factoren toe. Is er geen concreet toetsingskader
              voorhanden, ga dan verder met de vragen uit subonderdelen 4.3-4.5.
            id: "4.2.5"
            type:
              - open_text
            repeatable: false

      - task: Ernst van de inbreuk
        id: "4.3"
        description: >-
          NB: de vragen 4.3–4.5 hoeven alleen te worden beantwoord als en voor
          zover er negatieve impact is op grondrechten waarop geen specifieke
          wetgeving of rechtspraak van toepassing is, of als de toepassing
          van specifieke wetgeving of rechtspraak geen volledig of bevredigend
          antwoord heeft opgeleverd.
        type:
          - task_group
        repeatable: false
        tasks:
          - task: Instructie
            id: "4.3.0"
            is_official_id: false
            type:
              - task_group
            repeatable: false
            description: >-
              Inzicht in de ernst van de inbreuk is nodig om
              aan de slag te kunnen gaan met subonderdelen 4.4 en 4.5.
              Die vragen gaan over de vraag of het algoritme een geschikt
              en een noodzakelijk beleidsinstrument is om de gestelde
              doelen te realiseren (proportionaliteit). Een instrument kan
              in de praktijk meer of minder doeltreffend zijn. Ook er zit ook
              nogal wat ruimte tussen een instrument dat 'nuttig' is en een
              instrument dat echt 'onmisbaar' is om bepaalde doelen te
              bereiken. Dit subonderdeel van deel 4 heeft als doel om te
              helpen om te bepalen hoe doeltreffend of noodzakelijk de
              inzet van een algoritme nu echt moet zijn. Bij heel ernstige
              grondrechteninbreuken zal een maatregel (zoals een algoritme)
              alleen proportioneel zijn als die naar verwachting heel effectief
              is en als ook echt geen andere maatregelen mogelijk zijn.
              Andersom is het bij lichtere inbreuken niet zo erg als het
              algoritme maar een kleine verbetering oplevert of als niet heel
              uitgebreid onderzoek is gedaan naar alternatieven.
              De volgende vragen zijn erop gericht om als team een beeld
              te krijgen van de 'ernst' van de verwachte inbreuk op een
              grondrecht. Daarbij gaat het vooral om een brainstorm.
          - task: >-
              Hoe 'belangrijk' is het (aspect van het) grondrecht waarop het
              algoritme negatieve impact heeft? Leg uit of het gaat om een heel
              belangrijk (aspect van een) grondrecht, een niet zo belangrijk
              (aspect van een) grondrecht, of iets ertussenin.
            description: >-
              Om hier iets over te zeggen is het nuttig om te kijken naar de wezenlijke grondslagen van het grondrecht, die iets zeggen over waarom het
              zo belangrijk is om het te beschermen. Bij die wezenlijke grondslagen kan worden gedacht aan persoonlijke autonomie, vrijheid, menselijke
              waardigheid, gelijkwaardigheid, democratie, rechtsstaat (een vollediger overzichtje is te vinden bij de Grondrechtenclusters in het IAMA-
              toelichtingsdocument). Sommige (aspecten van) grondrechten zijn heel nauw met zo’n grondslag verbonden (‘kernrechten’), andere staan
              er veel verder vandaan. Aan de hand van de ‘afstand’ tot de grondslag kun je bepalen hoe ‘belangrijk’ het toepasselijke aspect van het
              grondrecht is. Concreter gezegd: hoe belangrijk is wat er op het spel staat voor het realiseren van vrijheid, gelijkwaardigheid, persoonlijke
              autonomie etc.?
            id: "4.3.1"
            type:
              - open_text
            repeatable: false
          - task: >-
              Hoe groot is de verwachte negatieve impact op het (aspect van het)
              grondrecht? Leg uit of het grondrecht heel vergaand wordt
              ingeperkt, of dat de invloed van het algoritme beperkt zal zijn.
            description: >-
              Om deze vraag te kunnen beantwoorden, kan bijvoorbeeld worden ingeschat hoeveel er nog van het
              grondrecht overblijft als het beperkende algoritme is doorgevoerd. Wordt het bijvoorbeeld heel erg
              moeilijk of bijna onmogelijk om het grondrecht nog te benutten, of levert het algoritme blijvende schade
              op? In dat geval is de negatieve impact heel groot. Of blijft de verwachte invloed van het algoritme op
              het grondrecht beperkt, bijvoorbeeld omdat de output gemakkelijk kan worden gecorrigeerd?
            id: "4.3.2"
            type:
              - open_text
            repeatable: false
          - task: >-
              Hoe 'ernstig' is de verwachte inbreuk op het grondrecht als de
              antwoorden op vragen 4.3.1 en 4.3.2 in onderlinge samenhang worden
              bekeken? Is de inbreuk te zien als 'ernstig', 'medium' of 'licht'?
            description: >-
              Een niet zo verstrekkende inbreuk op een minder belangrijk aspect van een grondrecht zal al snel gelden
              als een ‘lichte’ inbreuk, terwijl een heel vergaande inbreuk op een aspect dat dicht aanligt tegen de kern
              van het grondrecht juist heel ernstig is. Discussie is natuurlijk mogelijk als een lichte inbreuk wordt
              gemaakt op een heel belangrijk aspect van een grondrecht, of als een minder belangrijk aspect van een
              grondrecht juist wel heel vergaand wordt ingeperkt. In die gevallen zal de impact vaak als ‘medium’
              kunnen worden aangemerkt.
            id: "4.3.3"
            type:
              - open_text
            repeatable: false
            references:
              IAMA:
                - id: "5.A.2"
                  type: pre-view

      - task: Doeltreffendheid/effectiviteit/geschiktheid
        id: "4.4"
        type:
          - task_group
        repeatable: false
        tasks:
          - task: >-
              Kijk nog een keer naar de doelen zoals die bij vraag 1.1.2 zijn
              geformuleerd. Gaat het algoritme vrijwel zeker de doelen bereiken,
              of is dit heel onduidelijk of onwaarschijnlijk?
            id: "4.4.1"
            type:
              - open_text
            repeatable: false
            references:
              IAMA:
                - id: "5.A.5"
                  type: pre-view
          - task: >-
              Is het redelijk om het algoritme in te zetten als rekening wordt
              gehouden met:
            description: >-
              <ol><li> de verwachte doeltreffendheid/effectiviteit/
              geschiktheid, in samenhang met </li><li> de ernst van de
              grondrechteninbreuk die het resultaat is van het algoritme
              (vraag 4.3.3)</li></ol>
            id: "4.4.2"
            type:
              - open_text
            repeatable: false

      - task: Noodzakelijkheid/subsidiariteit
        id: "4.5"
        type:
          - task_group
        repeatable: false
        tasks:
          - task: >-
              Zouden de bij vraag 1.1.2 geformuleerde doelen ook kunnen worden
              bereikt zonder inzet van het algoritme? Zijn er andere
              (beleids)instrumenten beschikbaar die ook bruikbaar zouden zijn en
              die de grondrechten minder vergaand aantasten ('subsidiariteit')?
            id: "4.5.1"
            type:
              - open_text
            repeatable: false
            references:
              IAMA:
                - id: "5.A.6"
                  type: pre-view
          - task: >-
              Kunnen er aanpassingen worden gemaakt aan het algoritme (of de
              inbedding/toepassing ervan) waardoor de inbreuk op het grondrecht
              minder ernstig wordt? Zo ja, welke aanpassingen zijn dit?
            id: "4.5.2"
            type:
              - open_text
            repeatable: false
          - task: >-
              Welke restrisico's blijven er voor het grondrecht over als alle bij
              vraag 4.5.2 bedachte maatregelen doorgevoerd zijn?
            id: "4.5.3"
            type:
              - open_text
            repeatable: false
          - task: "Is het redelijk om het algoritme in te zetten als rekening wordt gehouden met:"
            description: >-
              <ol><li>de noodzaak van de inzet van dit specifieke algoritme, de beschikbare alternatieven en de eventuele aanpassingen (vragen 4.5.1–4.5.3), in samenhang met</li><li>de ernst van de grondrechteninbreuk die het resultaat is van het algoritme (vraag 4.3.3)</li></ol>
            id: "4.5.4"
            type:
              - open_text
            repeatable: false
      - task: Actiepunten Deel 4
        id: "4.actiepunten"
        is_official_id: false
        action_point_group: true
        description: >-
          Voer hieronder de actiepunten in die volgen uit dit deel.
          Voer één actiepunt per tekstvak in. Gebruik de knop om extra
          actiepunten toe te voegen.
        type:
          - task_group
        repeatable: false
        tasks:
          - task: Actiepunt
            id: "4.actiepunten.tekst"
            is_official_id: false
            type:
              - open_text
            repeatable: true

  - task: Deel 5 – Afsluiting
    action_point_summary: true
    description: |
      Via het IAMA zijn heel veel verschillende aspecten van de besluitvorming rondom de inzet van een algoritme in kaart gebracht. Op dit punt in het IAMA is inzicht verkregen in de doelen en redenen van de inzet ervan, in de totstandkoming van het algoritme en de manier waarop implementatie en inzet vorm krijgen, en in de verenigbaarheid van het algoritme met grondrechten. Het is nu van belang om de verschillende draden samen te nemen en het algoritme te beoordelen in het licht van alle overwegingen die tot nu toe op papier zijn gezet. Dit betekent dat een belangenafweging moet worden gemaakt: wat weegt uiteindelijk het zwaarst: de belangen die zullen worden gediend met de inzet van het algoritme, of de maatschappelijke of individuele belangen (inclusief grondrechten) die erdoor dreigen te worden geschaad?

      Een dergelijke belangenafweging kan nooit helemaal rationeel worden gemaakt, omdat het heel moeilijk is om objectief te bepalen hoe 'zwaarwegend' een belang is en hoe heel ongelijksoortige belangen als kostenbesparing, efficiëntie, privacy en milieu-impact met elkaar moeten worden vergeleken.

      Om de afsluitende belangenafweging zo goed mogelijk te maken en te onderbouwen, is het goed om de in het IAMA geformuleerde doelstellingen en grondrechten te vertalen naar 'belangen' die tegen elkaar kunnen worden afgewogen. Denk daarbij aan het beeld van de 'balans', die naar de ene of de andere kant kan doorslaan, maar ook in evenwicht kan hangen. Het voordeel van deze benadering is dat veel verschillende belangen in de uiteindelijke afweging kunnen worden betrokken, zoals maatschappelijke belangen (bijvoorbeeld de verwachte milieu-impact), belangen van kosteneffectiviteit of organisatorische efficiëntie, grondrechtelijke belangen en individuele belangen die niet als grondrechten kunnen worden gekwalificeerd.
    id: "5"
    is_official_id: false
    type:
      - task_group
    repeatable: false
    tasks:
      - task: Instructie
        id: "5.0"
        is_official_id: false
        type:
          - task_group
        repeatable: false
        description: >-
          De volgende vragen helpen bij het goed afsluiten van het IAMA. Ze zijn erop gericht om (A) de betrokken belangen in beeld te brengen en (B) op basis van al het voorgaande een advies te geven of besluit te nemen over de inzet van het algoritme. In het algemeen zal het uiteindelijke besluit moeten worden genomen door een politiek of ambtelijk verantwoordelijke. Deze verantwoordelijke zal daarnaast moeten kijken naar (C) de eventuele restrisico’s die bij inzet van het algoritme blijven bestaan.
      - task: Belangenafweging
        id: "5.A"
        type:
          - task_group
        repeatable: false
        tasks:
          - task: Gediende belangen
            id: "5.A.grp-gediend"
            is_official_id: false
            type:
              - task_group
            repeatable: false
            tasks:
              - task: Gediende belangen
                description: >-
                  Welke belangen worden met het algoritme gediend? (Kijk hierbij
                  naar de doelen (vraag 1.1.2), de geïdentificeerde positief geraakte
                  publieke waarden (vraag 1.2.1), de grondrechten waarop het
                  algoritme mogelijk positieve impact heeft (vraag 4.1.2), en de
                  belangen van de eigen organisatie.)
                id: "5.A.1"
                type:
                  - open_text
                repeatable: false
              - task: Zwaarwegendheid gediende belangen
                description: >-
                  Hoe concreet en hoe zwaarwegend zijn deze dienende belangen? Zie ook toelichting op vraag 4.3: 'Om hier iets over te zeggen is het nuttig om te kijken naar de wezenlijke grondslagen van het grondrecht, die iets zeggen over waarom het zo belangrijk is om het te beschermen. Bij die wezenlijke grondslagen kan worden gedacht aan persoonlijke autonomie, vrijheid, menselijke waardigheid, gelijkwaardigheid, democratie, rechtsstaat (een vollediger overzichtje is te vinden bij de Grondrechtenclusters in het IAMA- toelichtingsdocument). Sommige (aspecten van) grondrechten zijn heel nauw met zo’n grondslag verbonden (‘kernrechten’), andere staan er veel verder vandaan. Aan de hand van de ‘afstand’ tot de grondslag kun je bepalen hoe ‘belangrijk’ het toepasselijke aspect van het grondrecht is. Concreter gezegd: hoe belangrijk is wat er op het spel staat voor het realiseren van vrijheid, gelijkwaardigheid, persoonlijke autonomie etc.?'
                id: "5.A.3"
                type:
                  - open_text
                repeatable: false
              - task: Waarschijnlijkheid van belangen
                description: >-
                    Hoe waarschijnlijk is het dat deze belangen worden gediend met de
                    inzet van het algoritme? (Zie ook vraag 4.4.1.)
                id: "5.A.5"
                type:
                  - open_text
                repeatable: false
              - task: Noodzakelijkheid van de inzet
                description: >-
                  Hoe noodzakelijk is het om dit algoritme in te zetten om deze
                  belangen te dienen? (Zie ook vraag 4.5.1.)
                id: "5.A.6"
                type:
                  - open_text
                repeatable: false
          - task: Geschade belangen
            id: "5.A.grp-geschaad"
            is_official_id: false
            type:
              - task_group
            repeatable: false
            tasks:
              - task: Geschade belangen
                description: >-
                  Welke belangen worden door het algoritme geschaad? (Kijk hierbij
                  naar de effecten voor groepen of individuen (vraag 3.5.2), de
                  relevante maatschappelijke belangen (vraag 3.5.6), de ernst van de
                  verwachte grondrechteninbreuk (vraag 4.3.3), en de belangen van de
                  eigen organisatie.)
                id: "5.A.2"
                type:
                  - open_text
                repeatable: false
              - task: Zwaarwegendheid geschade belangen
                description: >-
                  Hoe concreet en hoe zwaarwegend zijn de schadende belangen? (Zie de
                  toelichting bij vraag 4.3 voor hulpmiddelen om deze vraag te
                  beantwoorden.)
                id: "5.A.4"
                type:
                  - open_text
                repeatable: false

      - task: Advies over inzet algoritme
        id: "5.B"
        description: >-
          Schrijf op basis van het bij vraag 5.A gemaakte overzicht en in het licht
          van de geformuleerde actiepunten en antwoorden op de vragen een advies
          over de vraag of het algoritme wel of niet moet worden ingezet, en
          onder welke voorwaarden. Daarin moet in ieder geval expliciet aandacht
          worden besteed aan de vraag of en waarom de inzet van het algoritme
          een redelijk evenwicht zal opleveren tussen de betrokken belangen.
        type:
          - open_text
        repeatable: false
      - task: Restrisico's en acceptatie
        id: "5.C"
        description: >-
          Het kan zijn dat er een restrisico voor bepaalde grondrechten of
          andere belangen blijft bestaan, ook nadat alle actiepunten zijn
          uitgevoerd en alle mitigerende maatregelen zijn geïmplementeerd. Maak
          hiervan een overzicht en zorg ervoor dat de inhoudelijk of politiek
          verantwoordelijke deze restrisico's doorneemt en vervolgens bewust
          accepteert of afwijst.
        type:
          - open_text
        repeatable: false
