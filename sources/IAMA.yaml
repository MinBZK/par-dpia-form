  - task: Deel 3 – Hoe?
    description: |
      Een algoritme als zodanig zorgt niet voor ongewenste effecten. Die worden altijd veroorzaakt door hoe het algoritme wordt ingezet, de context waarin het opereert en de beslissingen en maatregelen die worden gekoppeld aan de output van het algoritme.

      Deel 3 gaat dan ook over deze ‘Hoe?’ vraag: wat is de gebruikscontext van het algoritme? Wat is de rol van de medewerker? En wat is de impact van het algoritme op betrokkenen? Kortom: vragen over (de omgang met) de ‘output’ van het algoritme.
    id: "3"
    is_official_id: false
    type:
      - task_group
    repeatable: false
    tasks:
      - task: Deel 3 – Inhoud
        id: "3.0.0"
        is_official_id: false
        type:
          - task_group
        repeatable: false
        description: |
          In dit hoofdstuk komen de volgende onderdelen aan bod:
          <ol>
            <li>Gebruikscontext</li>
            <li>De rol van de medewerker</li>
            <li>Communicatie</li>
            <li>Monitoring en evaluatie</li>
            <li>Impact op betrokkenen en maatschappij</li>
          </ol>
      - task: Gebruikscontext
        id: "3.1"
        type:
          - task_group
        repeatable: false
        tasks:
          - task: >-
              Hoe ziet het proces eruit waar het algoritme een onderdeel van is?
              Wat gebeurt er met de uitkomsten van het algoritme en welke
              beslissingen worden daarop gebaseerd?
            id: "3.1.1"
            in_fria: true
            type:
              - open_text
            repeatable: false
          - task: >-
              Tijd/periode: wanneer gaat het algoritme ingezet worden? Hoe lang
              is de periode dat het ingezet wordt?
            id: "3.1.2"
            type:
              - open_text
            repeatable: false
          - task: Hoe frequent gaat het algoritme ingezet worden?
            id: "3.1.3"
            in_fria: true
            type:
              - open_text
            repeatable: false
          - task: >-
              Waar vindt inzet van het algoritme plaats? Is dat bijvoorbeeld in
              een bepaald geografisch gebied en/of bij een bepaalde groep
              personen of dossiers?
            id: "3.1.4"
            type:
              - open_text
            repeatable: false
          - task: >-
              Levert de inzet van dit algoritme mogelijk (onbedoelde)
              neveneffecten op bij andere algoritmes of organisatorische
              processen? Is er voldoende rekening gehouden met die
              neveneffecten? Leg uit.
            id: "3.1.5"
            type:
              - open_text
            repeatable: false

      - task: De rol van de medewerker
        id: "3.2"
        type:
          - task_group
        repeatable: false
        tasks:
          - task: >-
              Welke rol spelen medewerkers in het proces waar het algoritme een
              onderdeel van is ('menselijke tussenkomst')?
            id: "3.2.1"
            in_fria: true
            type:
              - open_text
            repeatable: false
          - task: >-
              Is het mogelijk voor de medewerker om af te wijken van de uitkomst
              van het algoritme (indien nodig)? Leg uit.
            id: "3.2.2"
            in_fria: true
            type:
              - open_text
            repeatable: false
          - task: >-
              Zijn de betrokken medewerkers voldoende AI-geletterd om met het
              algoritme om te gaan? Hebben medewerkers nieuwe kennis en
              vaardigheden nodig en hoe wordt gezorgd dat ze die krijgen?
            id: "3.2.3"
            type:
              - open_text
            repeatable: false
          - task: >-
              Vormt de inzet van het algoritme een risico voor de huidige kennis
              en kunde van de medewerker? Leg uit.
            id: "3.2.4"
            type:
              - open_text
            repeatable: false

      - task: Communicatie
        id: "3.3"
        type:
          - task_group
        repeatable: false
        tasks:
          - task: >-
              Op welke manier gaat er binnen de organisatie gecommuniceerd worden
              over de inzet van het algoritme?
            id: "3.3.1"
            type:
              - open_text
            repeatable: false
          - task: >-
              Wat is de externe communicatiestrategie over het algoritme en het
              proces eromheen?
            id: "3.3.2"
            type:
              - open_text
            repeatable: false
          - task: >-
              Wie is/zijn verantwoordelijk voor deze communicatiestrategieën?
            id: "3.3.3"
            type:
              - open_text
            repeatable: false
          - task: >-
              Hoe uitlegbaar en begrijpelijk is het algoritme voor betrokkenen?
            id: "3.3.4"
            type:
              - open_text
            repeatable: false

      - task: Monitoring en evaluatie
        id: "3.4"
        type:
          - task_group
        repeatable: false
        tasks:
          - task: >-
              Hoe wordt de inzet van het algoritme gemonitord gedurende de
              levenscyclus? Wat zijn de mogelijkheden voor bijsturing als blijkt
              dat de geïdentificeerde risico's zich daadwerkelijk manifesteren?
            id: "3.4.1"
            in_fria: true
            type:
              - open_text
            repeatable: false
          - task: >-
              Kunnen medewerkers op een laagdrempelige manier melding maken
              wanneer iets niet in orde lijkt te zijn rond het algoritme en hoe
              worden deze mensen dan gehoord? Leg uit.
            id: "3.4.2"
            in_fria: true
            type:
              - open_text
            repeatable: false
          - task: >-
              Kunnen betrokkenen op een laagdrempelige manier melding maken
              wanneer iets niet in orde lijkt te zijn rond het algoritme en hoe
              worden deze mensen dan gehoord? Leg uit.
            id: "3.4.3"
            type:
              - open_text
            repeatable: false
          - task: >-
              Bestaat er een risico dat het algoritme wordt ingezet voor andere
              doeleinden dan waar het oorspronkelijk voor is bedoeld ('function
              creep')? Zo ja, hoe wordt dit risico gemitigeerd?
            id: "3.4.4"
            type:
              - open_text
            repeatable: false
          - task: >-
              Wanneer is de inzet van het algoritme een succes? Op basis waarvan
              wordt dit bepaald? Op welk(e) moment(en) wordt dit bepaald?
            id: "3.4.5"
            type:
              - open_text
            repeatable: false

      - task: Impact op betrokkenen en maatschappij
        id: "3.5"
        type:
          - task_group
        repeatable: false
        tasks:
          - task: >-
              Welke mensen en/of groepen worden mogelijk geraakt door de inzet
              van het algoritme?
            id: "3.5.1"
            in_fria: true
            type:
              - open_text
            repeatable: false
          - task: >-
              Welke risico's of nadelige effecten introduceert de inzet van het
              algoritme voor deze mensen en/of groepen? Let ook op de geraakte
