  - task: Deel 4 – Mensenrechten
    description: |
      Grondrechten of mensenrechten zijn van bijzonder groot belang in een democratische rechtsstaat. Het zijn rechten die uitdrukking geven aan fundamentele waarden, zoals persoonlijke autonomie, vrijheid, menselijke waardigheid, gelijkwaardigheid, eerlijkheid (ook als het gaat om procedures) en democratie. We spreken meestal over mensenrechten als het gaat om rechten die echt alleen aan mensen toekomen of die alleen voor mensen nut hebben. Voorbeelden zijn het recht op leven en het verbod van onmenselijke of vernederende behandeling, maar ook het recht op bescherming van persoonsgegevens. Rechtspersonen, zoals ondernemingen, verenigingen of stichtingen, kunnen op die rechten geen beroep doen. Toch kunnen sommige belangrijke rechten ook voor rechtspersonen van belang zijn, ook al zijn zij dan geen 'mensen'. Denk bijvoorbeeld aan procedurele rechten, het recht op goed bestuur, het gelijkheidsbeginsel of het eigendomsrecht. Om die reden wordt in Nederland en ook in het EU-recht bij voorkeur gesproken van grondrechten of fundamentele rechten.

      Omdat algoritmes niet alleen impact kunnen hebben op mensen (natuurlijke personen), maar ook op rechtspersonen en soms zelfs op overheden, gebruiken wij hierna de bredere koepelterm grondrechten. Daartoe kunnen dus ook alle mensenrechten worden gerekend. Het IAMA (impact assessment voor mensenrechten en algoritmes) is dus eigenlijk een IAGA (impact assessment voor grondrechten en algoritmes).
    id: "4"
    is_official_id: false
    type:
      - task_group
    repeatable: false
    tasks:
      - task: Instructie
        id: "4.0"
        is_official_id: false
        description: >-
          Het vierde deel van dit IAMA heeft een tweeledig doel:


          <ol><li>Het IAMA dient als hulpmiddel om te identificeren of het in te zetten algoritme positieve of negatieve impact zal hebben op bepaalde (aspecten van) grondrechten;</li><li>Als er uiteindelijk een negatieve impact blijkt te zijn op grondrechten, dan maakt het IAMA een gestructureerde discussie mogelijk over de vraag of er redenen zijn waarom deze impact toch aanvaardbaar kan worden gevonden.</li></ol>


          De vragen uit subonderdelen 4.1, 4.2 en 4.6 zijn in de praktijk het belangrijkste. Vraag 4.1.1 is een brainstormvraag en kan met het hele team worden beantwoord. Subonderdeel 4.2 bevat uitzoekvragen, die het nodige juridische voorwerk vereisen.


          De vragen uit subonderdelen 4.3-4.5 komen alleen aan bod als uit het uitzoekwerk en de antwoorden op de vragen uit subonderdeel 4.2 blijkt dat dat nodig is. Alleen in dat geval is er namelijk een negatieve impact zichtbaar op grondrechten, maar biedt specifieke wetgeving of rechtspraak geen (volledig of bevredigend) antwoord op de vraag of het algoritme een gerechtvaardigde inbreuk maakt op grondrechten. Zorg er wel voor dat u, voor zover relevant, noteert welke maatregelen u van plan bent te treffen om de negatieve impact op grondrechten te mitigeren. <a class="rvo-tag rvo-tag--info rvo-tag--with-icon" href="https://eur-lex.europa.eu/legal-content/NL/TXT/HTML/?uri=OJ:L_202401689#art_27" target="_blank" rel="noopener noreferrer" title="Dit correspondeert met een vereiste uit art. 27 van de AI Verordening" style="margin-inline-start: 0.2em; vertical-align: middle; text-decoration: none; gap: 0.25em;">art. 27 AI-verordening<span class="utrecht-icon rvo-icon rvo-icon-externe-link rvo-icon--sm" role="img" aria-label="Opent in nieuw tabblad"></span></a>


          Juristen kan opvallen dat in dit IAMA-deel de stap van een wettelijke grondslag voor een grondrechteninbreuk ontbreekt. Die stap is in deel 1 al expliciet aan bod is gekomen, namelijk bij vraag 1.3.2. Het nogmaals opnemen van deze stap in het stappenplan zou onnodige herhaling opleveren. Ook de klassieke proportionaliteitsstap van het maken van een belangenafweging lijkt misschien te ontbreken. In dit IAMA is die onderdeel van de afsluitende, concluderende vragen.
        type:
          - task_group
        repeatable: false
      - task: Deel 4 – Inhoud
        id: "4.0.0"
        is_official_id: false
        type:
          - task_group
        repeatable: false
        description: |
          In dit hoofdstuk komen de volgende onderdelen aan bod:
          <ol>
            <li>Toepasselijke grondrechten</li>
            <li>Specifieke wetgeving</li>
            <li>Ernst van de inbreuk</li>
            <li>Doeltreffendheid/effectiviteit/geschiktheid</li>
            <li>Noodzakelijkheid/subsidiariteit</li>
          </ol>
      - task: Aangetaste grondrechten
        id: "4.1.1"
        type:
          - task_group
        repeatable: false
