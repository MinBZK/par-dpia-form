name: Impact Assessment Mensenrechten en Algoritmes
urn: 'urn:nl:iama:2.0'
version: "2.0"
description: >-
  Impact Assessment Mensenrechten en Algoritmes (IAMA) versie 2. Het IAMA helpt
  overheidsorganisaties bij het beoordelen van de impact van algoritmes op
  mensenrechten en publieke waarden, voorafgaand aan de ontwikkeling of inzet
  van een algoritme.
prefixQuestionIds: true
tasks:
  - task: Inleiding
    id: "0"
    is_official_id: false
    type:
      - task_group
      - informational
    repeatable: false
    tasks:
      - task: Toepassing van het IAMA
        description: |
          Het Impact Assessment Mensenrechten en Algoritmes ('IAMA') is een instrument voor discussie en besluitvorming. Het instrument faciliteert een interdisciplinaire dialoog door degenen die betrokken zijn bij de ontwikkeling en/of inzet van een algoritmisch systeem. Het IAMA kan worden toegepast op AI-systemen, maar ook op algoritmische systemen die geen kunstmatige intelligentie bevatten. Omwille van de leesbaarheid wordt in het IAMA de term 'algoritme' gebruikt. Voor een verdere uitleg over deze definities kan het <a href="https://www.rijksoverheid.nl/documenten/2026/02/16/toelichtingsdocument-impact-assessment-mensenrechten-en-algoritmes" target="_blank">IAMA-toelichtingsdocument</a> geraadpleegd worden.

          Het IAMA stuurt het projectteam aan om een advies te formuleren over het al dan niet inzetten van een algoritme, en over de voorwaarden waaraan die inzet zou moeten voldoen. Het IAMA is gericht op het inschatten van de impact van het algoritme op grondrechten en biedt daarnaast ruimte voor het aan bod laten komen van andere relevante aandachtspunten rondom de inzet van het algoritme, in een vroegtijdig stadium en op een gestructureerde manier. Daardoor wordt tegengegaan dat al te snel een algoritme wordt ingezet terwijl de consequenties daarvan niet goed zijn bekeken, met de daarbij behorende risico's, zoals die van onzorgvuldigheid, ineffectiviteit of inbreuk op grondrechten.

          Als er tijdens het doorlopen van het IAMA onduidelijkheid bestaat over de vragen of de begrippen die daarin genoemd worden, biedt het <a href="https://www.rijksoverheid.nl/documenten/2026/02/16/toelichtingsdocument-impact-assessment-mensenrechten-en-algoritmes" target="_blank">IAMA-toelichtingsdocument</a> extra houvast en verdieping.

          <div class="rvo-alert rvo-alert--info" style="display: flex;"><span class="utrecht-icon rvo-icon rvo-icon-info rvo-icon--xl rvo-status-icon-info" role="img" aria-label="Informatie"></span><div class="rvo-alert-text">Het huidige IAMA v2 is een actualisatie van de oorspronkelijke versie. Het is gestroomlijnd op basis van gebruikersfeedback en in lijn gebracht met de vereisten vanuit artikel 27 van de Europese AI-verordening. Eerder ingevulde IAMA's (v1) hoeven niet herzien te worden.</div></div>
        id: "0.0"
        is_official_id: false
        type:
          - task_group
        repeatable: false
        sources:
          - source: stroomschema_iama_v2.png
            description: Stroomschema van het IAMA v2 met de vijf delen (Waarom, Wat, Hoe, Mensenrechten, Afsluiting).

      - task: Toepassingsbereik IAMA
        description: |
          Het IAMA is een grondrechtenbeoordeling voor impactvolle algoritmes en hoog-risico AI-systemen. De Europese AI-verordening bepaalt welke AI-systemen als hoog-risico moeten worden geclassificeerd. Hiervoor gelden specifieke vereisten, waaronder een beoordeling van de gevolgen voor grondrechten (artikel 27 AI-verordening). Het IAMA is een instrument om invulling te geven aan een dergelijke grondrechtenbeoordeling. Bij de vragen in het IAMA die corresponderen met de verschillende vereisten uit artikel 27 van de AI-verordening is dat aangegeven door middel van een 'art. 27 AI-verordening'-icoontje. <a class="rvo-tag rvo-tag--info rvo-tag--with-icon" href="https://eur-lex.europa.eu/legal-content/NL/TXT/HTML/?uri=OJ:L_202401689#art_27" target="_blank" rel="noopener noreferrer" title="Dit correspondeert met een vereiste uit art. 27 van de AI Verordening" style="margin-inline-start: 0.2em; vertical-align: middle; text-decoration: none; gap: 0.25em;">art. 27 AI-verordening<span class="utrecht-icon rvo-icon rvo-icon-externe-link rvo-icon--sm" role="img" aria-label="Opent in nieuw tabblad"></span></a>

          Het IAMA is ook geschikt om een grondrechtenbeoordeling te geven bij impactvolle algoritmes die niet vallen in de categorie hoog-risico AI-systemen of die buiten het bereik van de AI-verordening vallen. Een impactvol algoritme is volgens de Handreiking Algoritmeregister een algoritme met directe rechtsgevolgen voor mensen of organisaties of een algoritme dat beïnvloedt hoe de overheid een persoon of groep categoriseert.

          Bij de inzet van generatieve AI of General Purpose AI kan de uitvoering van het IAMA in de praktijk soms moeilijk blijken. Dit zijn AI-systemen waar bijna altijd gebruik wordt gemaakt van een voorgetraind model van een externe leverancier. Hierdoor is het doorgaans onmogelijk om te weten wat de trainingsdata zijn, hoe de trainingsprocedure is gelopen en welke bias er in het model zit. Ook is het van belang voor het doorlopen van het IAMA dat het AI-systeem dat getoetst wordt een heldere doelbinding heeft. Dit is doorgaans moeilijker met General Purpose AI. Het <a href="https://www.rijksoverheid.nl/documenten/2026/02/16/toelichtingsdocument-impact-assessment-mensenrechten-en-algoritmes" target="_blank">IAMA-toelichtingsdocument</a> biedt extra handvatten voor de toepassing van het IAMA op generatieve AI en General Purpose AI.
        id: "0.1"
        is_official_id: false
        type:
          - task_group
        repeatable: false

      - task: Instructie
        description: |
          <strong>Vooraf</strong>

          De discussie over de verschillende vragen moet plaatsvinden in een breed samengesteld team waarin mensen met verschillende specialisaties en achtergronden zitting hebben. In het team moeten in elk geval de volgende functies betrokken worden:
          <ul>
            <li>Projectleider</li>
            <li>Data scientist</li>
            <li>Jurist</li>
          </ul>
          Hoewel bovengenoemde functies de kern beslaan van het team, is het cruciaal dat er meerdere functies betrokken worden bij dit proces. Een interdisciplinair en breed team is het uitganspunt. Voor houvast hierbij: zie de functietabel in het <a href="https://www.rijksoverheid.nl/documenten/2026/02/16/toelichtingsdocument-impact-assessment-mensenrechten-en-algoritmes" target="_blank">IAMA-toelichtingsdocument</a>. Voor een soepel proces wordt aangeraden het IAMA in te vullen met een groep van 4-7 personen, die op locatie aanwezig zijn en het IAMA gezamenlijk bespreken onder leiding van een gespreksleider. Een jurist die uitzoekwerk kan doen op het gebied van grondrechten is voor deel 4 onmisbaar.

          Voor het invullen van het IAMA, het ophalen van de benodigde informatie en reflectie op het waarom en hoe van de inzet van het algoritme, is tijd nodig. Wees op tijd met het inplannen van de sessies voor het IAMA en doe dit niet vlak voor een opleverdeadline. Het IAMA is geen afvinklijstje, maar een instrument voor dialoog, reflectie en besluitvorming.

          <strong>Tijdens</strong>

          Het wordt sterk aangeraden het proces in verschillende bijeenkomsten op te knippen, bijvoorbeeld een sessie van twee uur voor deel 1 en 2 en een sessie van twee uur voor deel 3 en subonderdeel 4.1. Voor subonderdeel 4.2 zal een jurist hoogstwaarschijnlijk uitzoekwerk moeten verrichten. Wanneer dat is gedaan, kan een laatste sessie worden gepland van een uur voor de resterende vragen van deel 4 en de afsluiting.

          Het is de bedoeling om in teamverband de vragen door te nemen en de antwoorden in het IAMA-document vast te leggen. Per vraag moeten de antwoorden en de belangrijkste overwegingen en gemaakte keuzes worden vastgelegd. Als meer houvast of uitleg gewenst is bij een specifiek subonderdeel, kan het <a href="https://www.rijksoverheid.nl/documenten/2026/02/16/toelichtingsdocument-impact-assessment-mensenrechten-en-algoritmes" target="_blank">IAMA-toelichtingsdocument</a> worden geraadpleegd.

          <strong>Na afloop</strong>

          Het IAMA stuurt het team aan om een advies te formuleren over het al dan niet inzetten van het algoritme, en over de voorwaarden waaraan inzet zou moeten voldoen. Dit advies kan ter goedkeuring worden voorgelegd aan de inhoudelijk of politiek verantwoordelijke(n). Deze verantwoordelijke dient eveneens te besluiten over acceptatie van eventuele restrisico's. Het ingevulde IAMA kan dienen als naslagwerk en ter verantwoording van het besluitvormingsproces rondom de ontwikkeling en de implementatie van het algoritme.
        id: "0.2"
        is_official_id: false
        type:
          - task_group
        repeatable: false

      - task: Nadere Toelichting
        description: |
          Nadere toelichting op verscheidene aspecten uit het IAMA kan worden gevonden in het <a href="https://www.rijksoverheid.nl/documenten/2026/02/16/toelichtingsdocument-impact-assessment-mensenrechten-en-algoritmes" target="_blank">IAMA-toelichtingsdocument</a>. Hierin wordt uitgebreide houvast gegeven voor de beantwoording van specifieke vragen, de werkwijze van het toepassen van het IAMA en de relatie met de AI-verordening.

          Voor een overzicht van de belangrijkste wettelijke vereisten wordt verwezen naar de meest recente versie van het <a href="https://minbzk.github.io/Algoritmekader/voldoen-aan-wetten-en-regels/hulpmiddelen/" target="_blank">Algoritmekader</a>. Daarin staat ook een overzicht van aanbevolen hulpmiddelen, die tevens nuttig kunnen zijn voor het toepassen van het IAMA.
        id: "0.3"
        is_official_id: false
        type:
          - task_group
        repeatable: false
  - task: Deel 1 – Waarom?
    description: |
      Deel 1 van het IAMA gaat over het ‘Waarom?’ van het voornemen om een algoritme in te gaan zetten. Wat zijn de aanleiding en de doelstelling van de inzet van het algoritme? Wat zijn de onderliggende waarden die geraakt worden door de inzet van het algoritme? En hoe worden de verantwoordelijkheden omtrent het algoritme ingeregeld? Deze overkoepelende vragen moeten in een besluitvormingsproces over de inzet van algoritmes als eerste worden behandeld, voordat wordt toegekomen aan technische vragen of mogelijke impact op grondrechten. Deze antwoorden zijn voor het beantwoorden van die specifiekere vragen namelijk steeds relevant.
    id: "1.0"
    is_official_id: false
    type:
      - task_group
    repeatable: false
    tasks:
      - task: Deel 1 – Inhoud
        id: "1.0.0"
        description: |
          In dit hoofdstuk komen de volgende onderdelen aan bod:
          <ol>
            <li>Aanleiding en doelstelling</li>
            <li>Publieke waarden</li>
            <li>Wettelijke grondslag</li>
            <li>Verantwoordelijkheden</li>
          </ol>
        is_official_id: false
        type:
          - task_group
        repeatable: false
      - task: Aanleiding en doelstelling
        id: "1.1"
        type:
          - task_group
        repeatable: false
        tasks:
          - task: Wat is de aanleiding geweest voor de ontwikkeling van het algoritme? Voor welk probleem moet het algoritme een oplossing bieden?
            id: "1.1.1"
            type:
              - open_text
            repeatable: false
          - task: Wat is het doel dat bereikt dient te worden met de inzet van het algoritme? Wat is hierbij het hoofddoel en wat zijn subdoelen?
            id: "1.1.2"
            in_fria: true
            type:
              - open_text
            repeatable: false
            references:
              IAMA:
                - id: "4.4.1"
                  type: pre-view
                - id: "4.5.1"
                  type: pre-view
                - id: "5.A.1"
                  type: pre-view
                - id: "2.1.2"
                  type: pre-view
      - task: Publieke waarden
        description: >-
          Noteer maximaal 6 publieke waarden per vraag.
          Bij de beantwoording van deze vragen kan het <a href="https://open.overheid.nl/documenten/c0531983-3f2f-44c2-b9b7-19dfe069a5fb/file" target="_blank">CODIO-waardenkader</a> in de toelichting als houvast genomen worden.
        id: "1.2"
        type:
          - task_group
        repeatable: false
        tasks:
          - task: Wat zijn de publieke waarden die mogelijk positief geraakt worden door de inzet van het algoritme?
            id: "1.2.1"
            type:
              - open_text
            repeatable: false
            references:
              IAMA:
                - id: "3.5.3"
                  type: pre-view
                - id: "5.A.1"
                  type: pre-view
          - task: Wat zijn de publieke waarden die mogelijk negatief geraakt worden door de inzet van het algoritme?
            id: "1.2.2"
            type:
              - open_text
            repeatable: false
            references:
              IAMA:
                - id: "3.5.2"
                  type: pre-view

      - task: Wettelijke grondslag
        id: "1.3"
        type:
          - task_group
        repeatable: false
        tasks:
          - task: Is het algoritme een verboden AI-systeem in de zin van artikel 5 van de AI-verordening?
            description: >-
              Zo ja, dan mag het algoritme niet worden gebruikt.
            id: "1.3.1"
            type:
              -  radio_option
            valueType: boolean
            options:
            - value: true
              label: Ja
            - value: false
              label: Nee
            repeatable: false
          - task: "Stop met de ontwikkeling of implementatie van het AI-systeem en ga terug naar de tekentafel."
            id: "1.3.3"
            type:
              - task_group
            repeatable: false
            dependencies:
              - type: conditional
                condition:
                  id: "1.3.1"
                  operator: equals
                  value: true
                action: show
          - task: Wordt het algoritme gebruikt om een wettelijke taak uit te voeren?
            description: >-
                NB: wanneer het algoritme slechts wordt gebruikt voor interne processen, is geen wettelijke grondslag vereist.
            id: "1.3.2"
            type:
              -  radio_option
            valueType: boolean
            options:
            - value: true
              label: Ja
            - value: false
              label: Nee
            repeatable: false
            dependencies:
              - type: conditional
                condition:
                  id: "1.3.1"
                  operator: equals
                  value: false
                action: show
          - task: Wat is de wettelijke grondslag hiervoor?
            id: "1.3.4"
            type:
              - open_text
            repeatable: false
            dependencies:
              - type: conditional
                condition:
                  id: "1.3.2"
                  operator: equals
                  value: true
                action: show

      - task: Verantwoordelijkheden
        id: "1.4"
        type:
          - task_group
        repeatable: false
        tasks:
          - task: Welke partijen en/of functies zijn er bij het algoritme betrokken? Hoe zijn de verantwoordelijkheden belegd?
            id: "1.4.1"
            type:
              - task_group
            is_official_id: true
            repeatable: false
            tasks:
              - task: A) Bij de ontwikkeling
                id: "1.4.1.1"
                is_official_id: false
                type:
                  - open_text
                repeatable: false
              - task: B) Bij de inzet
                id: "1.4.1.2"
                is_official_id: false
                type:
                  - open_text
                repeatable: false
              - task: C) Bij het beheer
                id: "1.4.1.3"
                is_official_id: false
                type:
                  - open_text
                repeatable: false
          - task: Wie is eindverantwoordelijk voor het algoritme?
            id: "1.4.2"
            type:
              - open_text
            repeatable: false
          - task: Is er een exitstrategie wanneer in de toekomst blijkt dat het algoritme niet meer gewenst of nodig is? Hoe ziet deze exitstrategie eruit?
            id: "1.4.3"
            type:
              - open_text
            repeatable: false
      - task: Actiepunten Deel 1
        id: "1.actiepunten"
        is_official_id: false
        action_point_group: true
        description: >-
          Voer hieronder de actiepunten in die volgen uit dit deel.
          Voer één actiepunt per tekstvak in. Gebruik de knop om extra
          actiepunten toe te voegen.
        type:
          - task_group
        repeatable: false
        tasks:
          - task: Actiepunt
            id: "1.actiepunten.tekst"
            is_official_id: false
            type:
              - open_text
            repeatable: true

  - task: Deel 2 – Wat?
    description: |
      In deel 2 wordt gekeken naar de gebruikte algoritmes en data: wat voor algoritme wordt er gebruikt? Hoe komt het tot stand? En is die toepassing eigenlijk wel goed genoeg? Voordat er gestart wordt met de vragen, worden drie verduidelijkingspunten uitgelicht:
      <ul>
        <li>Het IAMA spreekt van algoritmes, maar in de praktijk wordt ook over modellen gesproken. Een algoritme is een set van regels en instructies die een computer volgt om een taak uit te voeren. Dit kan een simpele set instructies zijn, maar ook gecompliceerd. Statistische modellen of machine learning modellen worden getraind op data. Modellen zijn ook algoritmes. In de vragen hier wordt de term 'algoritme' gebruikt waar het beide kan betreffen. Alleen bij vragen die uitsluitend gaan over zelflerende algoritmes wordt gesproken van een 'model'. Zie Definities in het <a href="https://www.rijksoverheid.nl/documenten/2026/02/16/toelichtingsdocument-impact-assessment-mensenrechten-en-algoritmes" target="_blank">IAMA-toelichtingsdocument</a> voor een verheldering.</li>
        <li>In sommige toepassingen worden meerdere algoritmes gecombineerd. Doet u bijvoorbeeld een risicoscreening met meerdere indicatoren, dan kan het zo zijn dat bepaalde indicatoren door een losstaand algoritme tot stand komen. De vragen in deel 2 zijn geformuleerd om een dergelijk geval per algoritme los te bespreken. Wel wordt in dat geval aangeraden om te beginnen aan het eind van de keten, omdat die laatste stap direct raakt aan de beleidsdoelstelling. (NB: Bespreek het systeem in delen 1, 3 en 4 van het IAMA alsnog in samenhang en niet per algoritme). Zie Notitie meerdere algoritmes in het <a href="https://www.rijksoverheid.nl/documenten/2026/02/16/toelichtingsdocument-impact-assessment-mensenrechten-en-algoritmes" target="_blank">IAMA-toelichtingsdocument</a> voor verdere tips over de aanpak van deel 2.</li>
        <li>Gebruikt uw toepassing generatieve AI of een Large Language Model? Dit maakt de vragen soms uitdagend. Lees eerst wat er in het <a href="https://www.rijksoverheid.nl/documenten/2026/02/16/toelichtingsdocument-impact-assessment-mensenrechten-en-algoritmes" target="_blank">IAMA-toelichtingsdocument</a> staat over generatieve AI.</li>
      </ul>
    id: "2"
    is_official_id: false
    type:
      - task_group
    repeatable: false
    tasks:
      - task: Deel 2 – Inhoud
        id: "2.0.0"
        is_official_id: false
        type:
          - task_group
        repeatable: false
        description: |
          In dit hoofdstuk komen de volgende onderdelen aan bod:
          <ol>
            <li>Type algoritme</li>
            <li>Totstandkoming algoritme</li>
            <li>Inzet algoritme</li>
            <li>Kwaliteit en accuraatheid</li>
            <li>Data governance en -beveiliging</li>
          </ol>
      - task: Type algoritme
        id: "2.1"
        type:
          - task_group
        repeatable: false
        tasks:
          - task: Wat voor type algoritme wordt ontwikkeld of gebruikt? Maak ten minste onderscheid tussen zelflerend en niet-zelflerend.
            id: "2.1.1"
            type:
              - task_group
            is_official_id: false
            repeatable: false
            tasks:
              - task: ""
                id: "2.1.1.1"
                is_official_id: false
                type:
                  - radio_option
                repeatable: false
                options:
                  - value: "zelflerend"
                    label: "Zelflerend"
                  - value: "niet-zelflerend"
                    label: "Niet-zelflerend"
              - task: Toelichting
                description: >-
                  Hoe specifieker het antwoord hier is, hoe makkelijker het is om de hiernavolgende vragen te beantwoorden.
                id: "2.1.1.2"
                is_official_id: false
                type:
                  - open_text
                repeatable: false
          - task: Welke alternatieven zijn er? Waarom is dit type algoritme het meest geschikt voor de geformuleerde doelstellingen? (zie vraag 1.1.2)
            id: "2.1.2"
            type:
              - open_text
            repeatable: false
      - task: Totstandkoming algoritme – Niet-zelflerend
        id: "2.2A"
        type:
          - task_group
        repeatable: false
        dependencies:
          - type: conditional
            condition:
              id: "2.1.1.1"
              operator: equals
              value: "niet-zelflerend"
            action: show
        tasks:
          - task: Hoe zijn de beslisregels tot stand gekomen?
            id: "2.2A.1"
            type:
              - open_text
            repeatable: false
          - task: Welke aannames en bias liggen in deze beslisregels besloten?
            id: "2.2A.2"
            type:
              - open_text
            repeatable: false
          - task: Hoe wordt dataminimalisatie gewaarborgd? Zijn alle indicatoren nodig om tot een goed resultaat te komen?
            id: "2.2A.3"
            type:
              - open_text
            repeatable: false

      - task: Totstandkoming algoritme – Zelflerend
        id: "2.2B"
        type:
          - task_group
        repeatable: false
        dependencies:
          - type: conditional
            condition:
              id: "2.1.1.1"
              operator: equals
              value: "zelflerend"
            action: show
        tasks:
          - task: Welke databronnen worden/zijn gebruikt om het model te trainen en testen?
            id: "2.2B.1"
            type:
              - open_text
            repeatable: false
          - task: Zijn de kwaliteit en betrouwbaarheid van de trainingsdata en testdata voldoende voor de beoogde toepassing? Leg uit.
            id: "2.2B.2"
            type:
              - open_text
            repeatable: false
          - task: Zijn de trainingsdata en testdata representatief voor de context waarin het algoritme ingezet gaat worden? Hoe verschillen de trainingsdata en testdata van de data die bij inzet als input dienen?
            id: "2.2B.3"
            type:
              - open_text
            repeatable: false
          - task: Hoe wordt dataminimalisatie gewaarborgd? Zijn alle data nodig om tot een goed resultaat te komen?
            id: "2.2B.4"
            type:
              - open_text
            repeatable: false

      - task: Inzet algoritme
        description: >-
          Als het algoritme extern wordt ingekocht en de ontwikkelaar niet aanwezig is, raadpleeg dan de instructies voor gebruik voor het beantwoorden van de volgende vragen.
        id: "2.3"
        type:
          - task_group
        repeatable: false
        tasks:
          - task: Wat voor type data gaan gebruikt worden als input voor het algoritme wanneer het in de praktijk wordt ingezet en uit welke bronnen zijn de data afkomstig?
            id: "2.3.1"
            type:
              - open_text
            repeatable: false
          - task: Zijn de kwaliteit en betrouwbaarheid van de data die als input worden gebruikt voor het algoritme voldoende voor de beoogde toepassing? Leg uit.
            id: "2.3.2"
            type:
              - open_text
            repeatable: false
          - task: Welke aannames en bias liggen besloten in de data die als input worden gebruikt voor het algoritme?
            id: "2.3.3"
            type:
              - open_text
            repeatable: false

      - task: Kwaliteit en accuraatheid
        id: "2.4"
        type:
          - task_group
        repeatable: false
        tasks:
          - task: Hoe wordt de kwaliteit van het algoritme bepaald? Welke metric of metrics zijn leidend en waarom?
            id: "2.4.1"
            type:
              - open_text
            repeatable: false
