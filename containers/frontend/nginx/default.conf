server {
    listen 8080;
    root /usr/share/nginx/html;

    absolute_redirect off;

    # Security headers (NCSC/BIO2). nginx stops inheriting add_header once a
    # location adds any of its own, so every location below re-includes these
    # snippets rather than relying on inheritance — one source of truth, no drift.
    include /etc/nginx/snippets/security-headers.conf;
    include /etc/nginx/snippets/csp-app.conf;

    # NCSC security.txt referentie
    location = /.well-known/security.txt {
        return 302 https://www.ncsc.nl/.well-known/security.txt;
    }

    location = /config.json {
        alias /tmp/config.json;
    }

    # Cache static assets
    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        include /etc/nginx/snippets/security-headers.conf;
        include /etc/nginx/snippets/csp-app.conf;
    }

    # Standalone invulhulp (single-file SPA via viteSingleFile). Its CSP uses
    # per-build SHA-256 hashes of the inlined script/style (no 'unsafe-inline'),
    # generated by the standalone build and copied in as csp-standalone.conf.
    location /zonder-account/ {
        alias /usr/share/nginx/html/zonder-account/;
        try_files $uri /zonder-account/index.html;

        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        include /etc/nginx/snippets/security-headers.conf;
        include /etc/nginx/snippets/csp-standalone.conf;
    }

    location = /version.json {
        default_type application/json;
        add_header Cache-Control "no-store" always;
        include /etc/nginx/snippets/security-headers.conf;
        include /etc/nginx/snippets/csp-app.conf;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        include /etc/nginx/snippets/security-headers.conf;
        include /etc/nginx/snippets/csp-app.conf;
    }
}
