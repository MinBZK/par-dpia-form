# CSP for the main SPA. `style-src 'self'` (no 'unsafe-inline', issue #326);
# `upgrade-insecure-requests`; Trusted Types enforced via a DOMPurify default
# policy (installTrustedTypesPolicy), with Vue's and DOMPurify's own policies
# allowlisted. Keycloak is the only third-party origin (connect/frame/form-action).
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://keycloak.rijksapp.nl; frame-src 'self' https://keycloak.rijksapp.nl; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self' https://keycloak.rijksapp.nl; upgrade-insecure-requests; require-trusted-types-for 'script'; trusted-types default vue dompurify;" always;
