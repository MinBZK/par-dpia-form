server {
    listen 8080;
    root /usr/share/nginx/html;

    absolute_redirect off;

    # Security headers (NCSC/BIO2)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://keycloak.rijksapp.nl; frame-src 'self' https://keycloak.rijksapp.nl; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self' https://keycloak.rijksapp.nl;" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # NCSC security.txt referentie
    location = /.well-known/security.txt {
        return 302 https://www.ncsc.nl/.well-known/security.txt;
    }

    location = /config.json {
        alias /tmp/config.json;
    }

    # Cache static assets
    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;

        # A location with its own add_header stops inheriting; re-add the security headers.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://keycloak.rijksapp.nl; frame-src 'self' https://keycloak.rijksapp.nl; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self' https://keycloak.rijksapp.nl;" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    # Standalone invulhulp (single-file SPA via viteSingleFile)
    # viteSingleFile inlinet alle JS/CSS → vereist 'unsafe-inline' voor script-src
    location /zonder-account/ {
        alias /usr/share/nginx/html/zonder-account/;
        try_files $uri /zonder-account/index.html;

        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    location = /version.json {
        default_type application/json;
        add_header Cache-Control "no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://keycloak.rijksapp.nl; frame-src 'self' https://keycloak.rijksapp.nl; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self' https://keycloak.rijksapp.nl;" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=0, must-revalidate" always;

        # Same caveat: re-add the security headers (keep in sync with the server
        # block) — without them index.html would ship with no CSP.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://keycloak.rijksapp.nl; frame-src 'self' https://keycloak.rijksapp.nl; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self' https://keycloak.rijksapp.nl;" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }
}
